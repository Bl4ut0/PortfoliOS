<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ROM Player Runtime</title>
    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #000;
            color: #fafafa;
            font-family: Inter, system-ui, sans-serif;
        }

        #game {
            width: 100%;
            height: 100%;
        }

        .runtime-empty {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            color: rgba(250, 250, 250, 0.54);
            background:
                linear-gradient(180deg, rgba(20, 184, 166, 0.08), transparent 42%),
                #000;
            font: 12px/1.5 ui-monospace, SFMono-Regular, Consolas, monospace;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .runtime-empty.is-hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="game"></div>
    <div class="runtime-empty" id="runtime-empty">Waiting for ROM</div>
    <script>
        (function() {
            const DATA_PATH = "https://cdn.emulatorjs.org/stable/data/";
            const emptyEl = document.getElementById("runtime-empty");
            let loaderStarted = false;

            function post(type, detail) {
                window.parent.postMessage({
                    source: "romplayer-runtime",
                    type,
                    detail
                }, window.location.origin);
            }

            function setEmptyVisible(isVisible) {
                if (emptyEl) emptyEl.classList.toggle("is-hidden", !isVisible);
            }

            function loadScript(src) {
                return new Promise((resolve, reject) => {
                    const script = document.createElement("script");
                    script.src = src;
                    script.onload = resolve;
                    script.onerror = () => reject(new Error("Failed to load EmulatorJS loader."));
                    document.head.appendChild(script);
                });
            }

            function configure(payload) {
                window.EJS_player = "#game";
                window.EJS_core = payload.core;
                window.EJS_gameUrl = payload.rom;
                window.EJS_gameName = payload.name;
                window.EJS_pathtodata = DATA_PATH;
                window.EJS_startOnLoaded = true;
                window.EJS_color = "#22d3ee";
                window.EJS_backgroundColor = "#050608";
                window.EJS_threads = false;
                window.EJS_volume = typeof payload.volume === "number" ? payload.volume : 0.7;
                window.EJS_alignStartButton = "center";
                window.EJS_ready = function() {
                    post("ready", payload.name);
                };
                window.EJS_onGameStart = function() {
                    post("started", payload.name);
                };
            }

            async function launch(payload) {
                if (loaderStarted) {
                    window.location.reload();
                    return;
                }

                try {
                    loaderStarted = true;
                    setEmptyVisible(false);
                    configure(payload);
                    await loadScript(DATA_PATH + "loader.js");
                } catch (error) {
                    console.error(error);
                    setEmptyVisible(true);
                    post("error", error.message || "EmulatorJS runtime failed.");
                }
            }

            window.addEventListener("message", (event) => {
                if (event.origin !== window.location.origin) return;
                const data = event.data || {};
                if (data.source !== "romplayer") return;

                if (data.type === "launch" && data.payload) {
                    launch(data.payload);
                }

                if (data.type === "volume" && window.EJS_emulator) {
                    window.EJS_emulator.volume = Math.max(0, Math.min(1, Number(data.value) || 0));
                }
            });
        })();
    </script>
</body>
</html>
