<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>OpenRCT2 Web Runtime</title>
        <script src="/volume-hook.js?v=1.0.55"></script>
        <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js" crossorigin="anonymous"></script>
        <style>
            :root {
                color-scheme: dark;
                --bg: #06110d;
                --panel: rgba(8, 18, 14, 0.88);
                --line: rgba(134, 239, 172, 0.22);
                --text: #f0fdf4;
                --muted: #9fb7aa;
                --green: #22c55e;
                --sky: #7dd3fc;
            }

            * {
                box-sizing: border-box;
            }

            html,
            body {
                min-height: 100%;
            }

            body {
                margin: 0;
                font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                color: var(--text);
                background:
                    radial-gradient(circle at 12% 10%, rgba(125, 211, 252, 0.18), transparent 24rem),
                    radial-gradient(circle at 82% 0%, rgba(34, 197, 94, 0.16), transparent 22rem),
                    linear-gradient(180deg, #0b1f27 0 36%, #14532d 36% 100%);
                overflow: hidden;
            }

            .runtime-shell {
                position: fixed;
                inset: 0;
                display: grid;
                place-items: center;
                padding: clamp(1rem, 4vw, 3rem);
            }

            .runtime-panel {
                width: min(42rem, 100%);
                padding: clamp(1rem, 3vw, 1.5rem);
                background: var(--panel);
                border: 1px solid var(--line);
                border-radius: 8px;
                box-shadow: 0 28px 80px rgba(0, 0, 0, 0.35);
            }

            .eyebrow {
                margin: 0 0 0.45rem;
                color: var(--green);
                font-family: Consolas, "Liberation Mono", monospace;
                font-size: 0.72rem;
                font-weight: 800;
                letter-spacing: 0.08em;
                text-transform: uppercase;
            }

            h1 {
                margin: 0;
                font-size: clamp(1.8rem, 4vw, 3rem);
                line-height: 0.95;
            }

            #loadingWebassembly,
            #statusMsg {
                margin: 1rem 0 0;
                color: var(--muted);
                line-height: 1.5;
            }

            #beforeLoad {
                margin-top: 1rem;
                padding-top: 1rem;
                border-top: 1px solid var(--line);
            }

            #selectFile {
                width: 100%;
                margin-top: 0.85rem;
                padding: 0.75rem;
                color: var(--text);
                background: rgba(255, 255, 255, 0.06);
                border: 1px solid var(--line);
                border-radius: 7px;
            }

            canvas {
                position: fixed;
                inset: 0;
                display: block;
                width: 100%;
                height: 100%;
                background: #000;
            }
        </style>
        <script src="index.js"></script>
    </head>
    <body>
        <main class="runtime-shell">
            <section class="runtime-panel">
                <p class="eyebrow">PortfoliOS runtime</p>
                <h1>OpenRCT2</h1>
                <p id="loadingWebassembly">Please wait... Loading WebAssembly runtime.</p>
                <div id="beforeLoad" style="display:none;">
                    <p id="statusMsg">Please select your RCT2 game data zip file.</p>
                    <input type="file" id="selectFile" accept=".zip">
                </div>
            </section>
        </main>
        <canvas id="canvas" style="display:none;"></canvas>
    </body>
</html>
